version: "3"

tasks:
  default:
    desc: Run the CI check suite (biome + tsc + tests)
    aliases: [check]
    cmds:
      - task: check:ci

  setup:
    desc: Install the Homebrew toolchain, then project dependencies
    sources: [Brewfile]
    generates: [Brewfile.lock.json]
    env:
      # macOS 27 is unknown to current Homebrew, so it resolves the bottle tag
      # as `arm64_dunno` and 404s. Pin to 26 (Tahoe) bottles, which run fine
      # on 27. Remove once Homebrew recognizes macOS 27.
      HOMEBREW_FAKE_MACOS: "26.0"
    cmds:
      - brew bundle
      - bun install
    platforms: [darwin]

  deps:check:
    desc: Verify the Brewfile toolchain is installed
    cmds:
      - brew bundle check --file=Brewfile --verbose

  install:
    desc: Install project dependencies (also installs the pre-push hook)
    cmds:
      - bun install

  dev:
    desc: Start the dev server at http://localhost:3000
    cmds:
      - bun run dev

  build:
    desc: Bundle the app to dist/
    cmds:
      - bun run build

  test:
    desc: Run the test suite
    cmds:
      - bun test {{.CLI_ARGS}}

  check:ci:
    desc: Non-mutating gate — biome check + tsc --noEmit + tests (matches CI)
    cmds:
      - bun run check:ci

  fix:
    desc: Format and lint with biome, applying fixes
    cmds:
      - bun run check
